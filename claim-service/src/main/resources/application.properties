server.port=8084
spring.application.name=claim-service

spring.datasource.url=jdbc:postgresql://postgres-claim:5432/claim_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=mySuperSecretKeyForJwtTokenGenerationWhichMustBeAtLeast32Bytes

services.customer.base-url=http://customer-service:8082
services.policy.base-url=http://policy-service:8083

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true